<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:#000;
color:white;
overflow:hidden;
}

/* Background Image */

.bg{
position:fixed;
width:100%;
height:100%;
background:url("bg.jpg") center/cover no-repeat;
opacity:0.35;
filter:blur(4px);
}

/* Floating animation */

.circle{
position:absolute;
border-radius:50%;
background:rgba(255,255,255,0.1);
animation:float 10s infinite linear;
}

.circle:nth-child(1){width:60px;height:60px;left:10%;top:80%;}
.circle:nth-child(2){width:40px;height:40px;left:80%;top:90%;}
.circle:nth-child(3){width:70px;height:70px;left:50%;top:100%;}

@keyframes float{
0%{transform:translateY(0)}
100%{transform:translateY(-120vh)}
}

/* Main Card */

.container{
position:relative;
z-index:2;
text-align:center;
padding:40px;
width:90%;
max-width:420px;

background:rgba(255,255,255,0.05);
backdrop-filter:blur(14px);

border-radius:20px;
box-shadow:0 0 40px rgba(0,0,0,0.8);

animation:fadeIn 1s ease;
}

/* Neon Title */

.title{
font-size:34px;
font-weight:bold;
color:#00ffe7;
text-shadow:0 0 10px #00ffe7,0 0 30px #00ffe7;
animation:glow 2s infinite alternate;
}

.sub{
font-size:18px;
margin-top:5px;
color:#eee;
}

.stats{
margin-top:12px;
font-size:20px;
color:#00ff9d;
font-weight:bold;
}

.owner{
margin-top:5px;
color:#ccc;
font-size:14px;
}

/* Description */

.desc{
margin-top:15px;
color:#ddd;
font-size:16px;
}

/* Button */

.btn{
display:inline-block;
margin-top:25px;
padding:16px 30px;

font-size:18px;
font-weight:bold;
color:white;

text-decoration:none;

border-radius:40px;

background:linear-gradient(45deg,#ff0055,#ffcc00);

box-shadow:0 0 25px rgba(255,0,100,0.8);

animation:pulse 2s infinite;
}

.btn:hover{
transform:scale(1.1);
}

/* Timer */

.timer{
margin-top:18px;
font-size:18px;
color:#ffcc00;
}

/* Progress Bar */

.progress{
margin-top:18px;
height:8px;
width:100%;
background:rgba(255,255,255,0.2);
border-radius:20px;
overflow:hidden;
}

.bar{
height:100%;
width:0%;
background:#00ffcc;
animation:progress 25s linear forwards;
}

/* Animations */

@keyframes glow{
from{ text-shadow:0 0 10px #00ffe7;}
to{ text-shadow:0 0 40px #00ffe7;}
}

@keyframes pulse{
0%{transform:scale(1)}
50%{transform:scale(1.06)}
100%{transform:scale(1)}
}

@keyframes progress{
from{width:0%}
to{width:100%}
}

@keyframes fadeIn{
from{opacity:0; transform:translateY(30px)}
to{opacity:1; transform:translateY(0)}
}
